name: "🔐 NIS2/DORA Security & Compliance Pipeline"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION:  "1.9.0"
  OPA_VERSION: "0.68.0"
  AWS_REGION:  "eu-central-1"
  TF_WORK_DIR: "envs/dev"
  OPA_DIR:     "policies-as-code/opa"

jobs:
  # ════════════════════════════════════════════════════
  # JOB 1: Secrets Scan — MUST pass before anything else
  # NIS2 Art.25: No credentials in source code
  # ════════════════════════════════════════════════════
  secrets-scan:
    name: "🔑 Secrets Scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Hard fail — secrets block EVERYTHING downstream

  # ════════════════════════════════════════════════════
  # JOB 2: Code Quality
  # ════════════════════════════════════════════════════
  code-quality:
    name: "📝 Code Quality"
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Terraform fmt (hard fail)
        run: |
          terraform fmt -recursive -check -diff
          echo "✅ Formatting correct"

      - name: Terraform validate
        run: |
          cd ${{ env.TF_WORK_DIR }}
          terraform init -backend=false -input=false -no-color
          terraform validate -no-color
          echo "✅ Configuration valid"

  # ════════════════════════════════════════════════════
  # JOB 3: Security Scanning — HARD FAIL on HIGH+
  # NIS2 Art.28: All IaC must pass security review
  # ════════════════════════════════════════════════════
  security-scan:
    name: "🔍 Security Scan (tfsec + checkov)"
    runs-on: ubuntu-latest
    needs: code-quality
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec (HARD FAIL on HIGH+)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false               # HARD FAIL — was true before!
          minimum_severity: HIGH
          format: sarif
          additional_args: "--exclude-downloaded-modules"

      - name: Upload tfsec SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: tfsec

      - name: Run checkov (HARD FAIL on CRITICAL)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORK_DIR }}
          framework: terraform
          soft_fail: false               # HARD FAIL!
          output_format: sarif
          output_file_path: checkov.sarif
          check: "CKV_AWS_*"            # Focus on AWS checks

      - name: Upload checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ════════════════════════════════════════════════════
  # JOB 4: OPA Policy Compliance
  # NIS2/DORA/ISO 27001 policy validation
  # ════════════════════════════════════════════════════
  opa-compliance:
    name: "⚖️ NIS2/DORA OPA Compliance"
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sL https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static \
            -o /usr/local/bin/opa
          chmod +x /usr/local/bin/opa
          opa version

      - name: OPA unit tests (HARD FAIL)
        run: |
          echo "=== Running NIS2/DORA OPA Policy Tests ==="
          opa test ${{ env.OPA_DIR }} -v --format pretty
          echo "✅ All OPA tests passed"

      - name: OPA lint (check policy quality)
        run: |
          opa check ${{ env.OPA_DIR }} --strict
          echo "✅ OPA policies are well-formed"

  # ════════════════════════════════════════════════════
  # JOB 5: Terraform Plan + OPA Eval
  # ════════════════════════════════════════════════════
  terraform-plan:
    name: "🏗️ Terraform Plan + OPA Eval"
    runs-on: ubuntu-latest
    needs: [security-scan, opa-compliance]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Verify EU region (NIS2 Art.28)
        run: |
          REGION="${{ env.AWS_REGION }}"
          if [[ "$REGION" != eu-* ]]; then
            echo "❌ NIS2 VIOLATION: Region $REGION is not EU!"
            echo "NIS2 Art.28 requires EU data residency."
            exit 1
          fi
          echo "✅ EU region confirmed: $REGION"

      - name: Terraform init & plan
        working-directory: ${{ env.TF_WORK_DIR }}
        run: |
          terraform init
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          terraform show -json tfplan > plan.json

      - name: OPA compliance eval (HARD FAIL)
        working-directory: ${{ env.TF_WORK_DIR }}
        run: |
          curl -sL https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static \
            -o /usr/local/bin/opa && chmod +x /usr/local/bin/opa
          
          echo "=== Evaluating plan against NIS2/DORA policies ==="
          RESULT=$(opa eval \
            --data ../../${{ env.OPA_DIR }}/policies.rego \
            --input plan.json \
            --format raw \
            "data.terraform.security.result")
          
          echo "$RESULT"
          
          PASSED=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('passed', False))")
          COUNT=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count', 0))")
          
          if [ "$PASSED" = "True" ]; then
            echo "✅ Plan passes all NIS2/DORA compliance checks"
          else
            echo "❌ COMPLIANCE FAILURE: $COUNT violation(s)"
            echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(' ❌', m) for m in d.get('messages', [])]"
            exit 1
          fi

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORK_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const body = `## 🏗️ Terraform Plan — \`${{ env.TF_WORK_DIR }}\`\n\`\`\`hcl\n${plan.length > maxLen ? plan.slice(0, maxLen) + '\n\n... (truncated)' : plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ════════════════════════════════════════════════════
  # JOB 6: Cost Estimation (infracost)
  # ════════════════════════════════════════════════════
  cost-estimate:
    name: "💰 Cost Estimation (infracost)"
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate infracost estimate
        run: |
          infracost breakdown \
            --path ${{ env.TF_WORK_DIR }} \
            --format json \
            --out-file /tmp/infracost.json || true

      - name: Post cost comment on PR
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update
        continue-on-error: true  # Don't fail if API key not set

  # ════════════════════════════════════════════════════
  # JOB 7: Compliance Report
  # ════════════════════════════════════════════════════
  compliance-report:
    name: "📊 NIS2/DORA Compliance Report"
    runs-on: ubuntu-latest
    needs: [opa-compliance]
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sL https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static \
            -o /usr/local/bin/opa && chmod +x /usr/local/bin/opa

      - name: Generate compliance report
        run: |
          mkdir -p reports
          cat > reports/compliance-report-${{ github.run_number }}.md << REPORT
          # NIS2/DORA Compliance Report
          **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Branch:** ${{ github.ref_name }}
          **Run:** #${{ github.run_number }}
          **Commit:** ${{ github.sha }}

          ## OPA Policy Results
          $(opa test ${{ env.OPA_DIR }} 2>&1 || echo "OPA tests failed")

          ## Frameworks Covered
          - NIS2 (EU 2022/2555) — Articles 21, 23, 25, 28, 32
          - DORA (EU 2022/2554) — Article 16
          - ISO 27001:2022 — 35+ controls
          - BSI IT-Grundschutz — ORP.4, CON.1, DER.2.1, NET.1.1
          REPORT
          echo "✅ Report generated"

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-${{ github.run_number }}
          path: reports/
          retention-days: 90

  # ════════════════════════════════════════════════════
  # JOB 8: Deploy (main only, all checks pass)
  # ════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to Dev (eu-central-1)"
    runs-on: ubuntu-latest
    needs: [terraform-plan, compliance-report]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev
      url: https://eu-central-1.console.aws.amazon.com/

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORK_DIR }}
        run: |
          terraform init
          terraform apply -auto-approve -var="env=dev"
          echo "✅ Deployed to eu-central-1 (Frankfurt)"
          terraform output -json | jq '{region: .region.value, compliance: .compliance_summary.value}'
